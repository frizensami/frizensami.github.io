name: Build Blood Stocks History

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Checkout blood stocks data
        uses: actions/checkout@v4
        with:
          repository: frizensami/red-cross-blood-stocks
          path: .blood-stocks
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Generate history
        run: node scripts/bloodstocks-history.js
        env:
          BLOOD_STOCKS_REPO: .blood-stocks
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: blood-history
          path: assets/blood-history.json
